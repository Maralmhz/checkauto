<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckAuto — Painel Super Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --primary-color: #27ae60;
      --primary-hover: #219a52;
      --dark-bg: #1a1a2e;
      --card-bg: #16213e;
    }
    body {
      background: var(--dark-bg);
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .admin-header {
      background: var(--card-bg);
      border-bottom: 2px solid var(--primary-color);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary-color);
      margin: 0;
    }
    .admin-header .badge-role {
      background: var(--primary-color);
      color: #fff;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 10px;
      vertical-align: middle;
    }
    .main-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title i {
      color: var(--primary-color);
    }
    .card-admin {
      background: var(--card-bg);
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      overflow: hidden;
    }
    .table-admin {
      color: #ddd;
      margin: 0;
    }
    .table-admin thead tr {
      background: #0f3460;
    }
    .table-admin thead th {
      font-weight: 600;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aac;
      border-bottom: none;
      padding: 14px 16px;
    }
    .table-admin tbody tr {
      border-bottom: 1px solid #2a2a4a;
      transition: background 0.15s;
    }
    .table-admin tbody tr:hover {
      background: rgba(39, 174, 96, 0.06);
    }
    .table-admin td {
      padding: 12px 16px;
      vertical-align: middle;
      font-size: 0.88rem;
    }
    .badge-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .badge-pendente  { background: #7a5c00; color: #ffd970; }
    .badge-aprovado  { background: #0a4020; color: #4dde90; }
    .badge-rejeitado { background: #4a0a0a; color: #ff7b7b; }
    .btn-aprovar {
      background: var(--primary-color);
      border: none;
      color: #fff;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-aprovar:hover  { background: var(--primary-hover); }
    .btn-aprovar:disabled { opacity: 0.5; cursor: default; }
    .btn-rejeitar {
      background: #c0392b;
      border: none;
      color: #fff;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-left: 6px;
    }
    .btn-rejeitar:hover  { background: #a93226; }
    .btn-rejeitar:disabled { opacity: 0.5; cursor: default; }
    .btn-sair {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
      padding: 6px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sair:hover {
      border-color: #e74c3c;
      color: #e74c3c;
    }
    .loading-row td {
      text-align: center;
      color: #888;
      padding: 32px 0;
    }
    .toast-admin {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 22px;
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      font-size: 0.9rem;
      z-index: 9999;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="admin-header">
    <div>
      <h1><i class="fas fa-shield-halved me-2"></i>CheckAuto — Painel Super Admin<span class="badge-role">SUPERADMIN</span></h1>
    </div>
    <button class="btn-sair" onclick="adminLogout()"><i class="fas fa-sign-out-alt me-1"></i>Sair</button>
  </header>

  <!-- MAIN -->
  <div class="main-container">
    <div class="section-title">
      <i class="fas fa-store"></i> Oficinas Cadastradas
      <button class="btn btn-sm ms-auto" style="background:var(--primary-color);color:#fff;font-size:0.8rem;border:none;" onclick="carregarOficinas()">
        <i class="fas fa-sync-alt me-1"></i>Atualizar
      </button>
    </div>

    <div class="card-admin">
      <table class="table table-admin">
        <thead>
          <tr>
            <th>Nome</th>
            <th>CNPJ</th>
            <th>Email</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="oficinasTableBody">
          <tr class="loading-row"><td colspan="5"><i class="fas fa-spinner fa-spin me-2"></i>Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
