<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckAuto — Painel Super Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #f5f7fb; }
    .topbar {
      background: #1f2937;
      color: #fff;
      border-bottom: 4px solid #27ae60;
    }
    .brand-title { font-size: 1.25rem; font-weight: 700; margin: 0; }
    .card { border: 0; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .badge-status { text-transform: capitalize; }
    .table td, .table th { vertical-align: middle; }
    .btn-icon { display: inline-flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <header class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center gap-3">
      <h1 class="brand-title">CheckAuto — Painel Super Admin</h1>
      <button id="btnLogout" class="btn btn-outline-light btn-sm">
        <i class="fas fa-sign-out-alt me-1"></i>Sair
      </button>
    </div>
  </header>

  <main class="container py-4">
    <section class="card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Oficinas</h2>
          <button id="btnReload" class="btn btn-secondary btn-sm">Atualizar</button>
        </div>

        <div id="feedback" class="alert d-none" role="alert"></div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Nome</th>
                <th>CNPJ</th>
                <th>Email</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="oficinasTbody">
              <tr>
                <td colspan="5" class="text-center text-muted py-4">Carregando oficinas...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
