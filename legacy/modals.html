<!-- MODAL CLIENTE -->
<div id="clienteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="clienteModalTitle">Novo Cliente</h3>
            <span class="close" onclick="closeClienteModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="clienteForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="clienteNome">Nome Completo *</label>
                        <input type="text" id="clienteNome" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="clienteCPF">CPF/CNPJ</label>
                        <input type="text" id="clienteCPF" data-mask="cpf-cnpj">
                    </div>
                    <div class="form-group">
                        <label for="clienteTelefone">Telefone *</label>
                        <input type="text" id="clienteTelefone" data-mask="phone" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="clienteEmail">E-mail</label>
                        <input type="email" id="clienteEmail">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="clienteEndereco">Endereço Completo</label>
                        <textarea id="clienteEndereco" rows="3"></textarea>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeClienteModal()">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="salvarCliente()">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL VEÍCULO -->
<div id="veiculoModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="veiculoModalTitle">Novo Veículo</h3>
            <span class="close" onclick="closeVeiculoModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="veiculoForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="veiculoCliente">Cliente *</label>
                        <select id="veiculoCliente" required>
                            <option value="">Selecione um cliente</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="veiculoPlaca">Placa *</label>
                        <input type="text" id="veiculoPlaca" maxlength="8" style="text-transform: uppercase;" required>
                    </div>
                    <div class="form-group">
                        <label for="veiculoModelo">Modelo *</label>
                        <input type="text" id="veiculoModelo" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="veiculoChassis">Chassis</label>
                        <input type="text" id="veiculoChassis">
                    </div>
                    <div class="form-group">
                        <label for="veiculoAno">Ano</label>
                        <input type="text" id="veiculoAno" maxlength="9" placeholder="Ex: 2020/2021">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="veiculoCor">Cor</label>
                        <input type="text" id="veiculoCor">
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeVeiculoModal()">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="salvarVeiculo()">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL ORDEM DE SERVIÇO -->
<div id="osModal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3 id="osModalTitle">Nova Ordem de Serviço</h3>
            <span class="close" onclick="closeOSModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="osForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="osCliente">Cliente *</label>
                        <select id="osCliente" onchange="atualizarVeiculosOS()" required>
                            <option value="">Selecione um cliente</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="osVeiculo">Veículo *</label>
                        <select id="osVeiculo" required disabled>
                            <option value="">Selecione um veículo</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="osDescricao">Descrição do Serviço *</label>
                        <textarea id="osDescricao" rows="4" placeholder="Descreva os serviços a serem realizados..." required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="osStatus">Status</label>
                        <select id="osStatus">
                            <option value="aguardando">Aguardando</option>
                            <option value="em_andamento">Em Andamento</option>
                            <option value="concluida">Concluída</option>
                            <option value="cancelada">Cancelada</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="osValor">Valor Total (R$)</label>
                        <input type="text" id="osValor" placeholder="0,00" data-mask="money">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="osDataEntrada">Data de Entrada</label>
                        <input type="date" id="osDataEntrada">
                    </div>
                    <div class="form-group">
                        <label for="osDataPrevisao">Previsão de Entrega</label>
                        <input type="date" id="osDataPrevisao">
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeOSModal()">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="salvarOS()">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL AGENDAMENTO -->
<div id="agendamentoModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="agendamentoModalTitle">Novo Agendamento</h3>
            <span class="close" onclick="closeAgendamentoModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="agendamentoForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="agendamentoCliente">Cliente (opcional)</label>
                        <select id="agendamentoCliente" onchange="atualizarVeiculosAgendamento()">
                            <option value="">Selecione um cliente</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agendamentoNomeLivre">Nome pré-cadastro (sem cliente)</label>
                        <input type="text" id="agendamentoNomeLivre" placeholder="Ou digite nome pré-cadastro">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agendamentoVeiculo">Veículo</label>
                        <select id="agendamentoVeiculo" disabled>
                            <option value="">Selecione um veículo</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agendamentoData">Data *</label>
                        <input type="date" id="agendamentoData" required>
                    </div>
                    <div class="form-group">
                        <label for="agendamentoHora">Horário *</label>
                        <input type="time" id="agendamentoHora" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agendamentoServico">Serviço *</label>
                        <input type="text" id="agendamentoServico" placeholder="Ex: Revisão, Alinhamento, Troca de óleo..." required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agendamentoObs">Observações</label>
                        <textarea id="agendamentoObs" rows="3" placeholder="Observações adicionais..."></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agendamentoStatus">Status</label>
                        <select id="agendamentoStatus">
                            <option value="pendente">Pendente</option>
                            <option value="confirmado">Confirmado</option>
                            <option value="cancelado">Cancelado</option>
                            <option value="atendido">Atendido</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeAgendamentoModal()">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="salvarAgendamento()">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL VISUALIZAÇÃO OS -->
<div id="viewOSModal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>Detalhes da OS #<span id="viewOSNumero"></span></h3>
            <span class="close" onclick="closeViewOSModal()">&times;</span>
        </div>
        <div class="modal-body" id="viewOSContent">
            <!-- Conteúdo dinâmico -->
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeViewOSModal()">Fechar</button>
            <button type="button" class="btn btn-primary" onclick="imprimirOS()"><i class="fas fa-print"></i> Imprimir</button>
        </div>
    </div>
</div>

<style>
/* ESTILOS DOS MODAIS */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    animation: fadeIn 0.3s;
}

.modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background-color: white;
    border-radius: 8px;
    width: 90%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideDown 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.modal-content.modal-large {
    max-width: 900px;
}

.modal-header {
    padding: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 8px 8px 0 0;
}

.modal-header h3 {
    margin: 0;
    font-size: 1.5em;
}

.modal-header .close {
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    width: 35px;
    height: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.3s;
}

.modal-header .close:hover {
    background: rgba(255,255,255,0.3);
    transform: rotate(90deg);
}

.modal-body {
    padding: 30px;
}

.modal-footer {
    padding: 20px;
    background: #f8f9fa;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    border-radius: 0 0 8px 8px;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@media (max-width: 768px) {
    .modal-content {
        width: 95%;
        margin: 20px;
    }
    
    .modal-body {
        padding: 20px;
    }
}
</style>
