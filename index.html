    <script>
        function mudaAbaChecklist(aba) {
            document.querySelectorAll('.checklist-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('aba-' + aba).classList.add('active');
        }
        
        function atualizarCombustivelVisual(valor) {
            const bars = document.querySelectorAll('.combustivel-bar');
            bars.forEach((bar, index) => {
                if (index < valor) {
                    bar.classList.add('filled');
                } else {
                    bar.classList.remove('filled');
                }
            });
        }

        function gerarNumeroOS() {
            const placa = document.getElementById('checklistVeiculoPlaca').value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            if (placa.length >= 3) {
                const data = new Date();
                const dia = String(data.getDate()).padStart(2, '0');
                const mes = String(data.getMonth() + 1).padStart(2, '0');
                const ano = String(data.getFullYear()).slice(-2);
                const numeroOS = `${placa}-${dia}${mes}${ano}`;
                document.getElementById('checklistNumeroOS').textContent = numeroOS;
            }
        }

        function toggleCombustivel(tipo) {
            document.querySelectorAll('.combustivel-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.combustivel-btn').classList.add('active');
        }

        function toggleLuzPainel(luz) {
            event.target.closest('.luz-painel-btn').classList.toggle('active');
        }
        
        if (document.getElementById('nivelCombustivel')) {
            atualizarCombustivelVisual(document.getElementById('nivelCombustivel').value);
        }

        // Atualizar data no checklist
        const hoje = new Date();
        const dataFormatada = hoje.toLocaleDateString('pt-BR');
        if (document.getElementById('checklistData')) {
            document.getElementById('checklistData').textContent = dataFormatada;
        }
    </script>
