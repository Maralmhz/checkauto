<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0066cc">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Reset de centralização */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            overflow: hidden;
            background: linear-gradient(135deg, #0066cc 0%, #00509e 100%);
        }

        /* Logos flutuantes */
        .logos-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .logo-float {
            position: absolute;
            bottom: -120px;
            opacity: 0;
            width: 80px;
            /* mix-blend-mode multiply = fundo branco some, so o desenho fica */
            mix-blend-mode: multiply;
            filter: invert(1) opacity(0.22);
            animation: floatDiag linear infinite;
        }
        @keyframes floatDiag {
            0%   { transform: translate(0,    0)      rotate(-18deg); opacity: 0;    }
            8%   {                                                     opacity: 1;    }
            92%  {                                                     opacity: 1;    }
            100% { transform: translate(260px,-108vh) rotate(-18deg); opacity: 0;    }
        }
        .logo-float:nth-child(1)  { left:  1%; width:60px;  animation-duration:13s; animation-delay:  0s; }
        .logo-float:nth-child(2)  { left: 10%; width:80px;  animation-duration:17s; animation-delay:  2s; }
        .logo-float:nth-child(3)  { left: 19%; width:55px;  animation-duration:11s; animation-delay:  5s; }
        .logo-float:nth-child(4)  { left: 29%; width:90px;  animation-duration:19s; animation-delay:  1s; }
        .logo-float:nth-child(5)  { left: 40%; width:65px;  animation-duration:14s; animation-delay:  7s; }
        .logo-float:nth-child(6)  { left: 51%; width:75px;  animation-duration:16s; animation-delay:  3s; }
        .logo-float:nth-child(7)  { left: 61%; width:58px;  animation-duration:12s; animation-delay:  9s; }
        .logo-float:nth-child(8)  { left: 71%; width:85px;  animation-duration:18s; animation-delay:  6s; }
        .logo-float:nth-child(9)  { left: 81%; width:62px;  animation-duration:15s; animation-delay:  4s; }
        .logo-float:nth-child(10) { left: 90%; width:70px;  animation-duration:20s; animation-delay: 11s; }

        /* Caixa de login acima do fundo */
        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .background-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Fundo com circulos originais -->
    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Logos flutuantes -->
    <div class="logos-bg">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
    </div>

    <!-- Caixa de login centralizada -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="logo-default.png" alt="Logo" style="height:60px">
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <input type="email" id="email" placeholder="seu@email.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn-login">
                    <span id="btnText">Entrar</span>
                    <i class="fas fa-spinner fa-spin" id="btnLoader" style="display: none;"></i>
                </button>
            </form>
        </div>
    </div>

<script type="module" src="login.js"></script>
</body>
</html>
