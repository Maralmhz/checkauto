<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0066cc">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Garante que body centraliza verticalmente */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container de logos no fundo */
        .logos-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .logo-float {
            position: absolute;
            opacity: 0;
            animation: floatDiag linear infinite;
        }

        @keyframes floatDiag {
            0%   { transform: translate(0, 0) rotate(-20deg);        opacity: 0;    }
            8%   { opacity: 0.18; }
            92%  { opacity: 0.18; }
            100% { transform: translate(280px, -105vh) rotate(-20deg); opacity: 0; }
        }

        /* Posicoes e tempos de cada logo */
        .logo-float:nth-child(1)  { left:  0%; bottom:-90px; animation-duration:13s; animation-delay:  0s; }
        .logo-float:nth-child(2)  { left:  9%; bottom:-90px; animation-duration:17s; animation-delay:  2s; }
        .logo-float:nth-child(3)  { left: 18%; bottom:-90px; animation-duration:11s; animation-delay:  5s; }
        .logo-float:nth-child(4)  { left: 27%; bottom:-90px; animation-duration:19s; animation-delay:  1s; }
        .logo-float:nth-child(5)  { left: 38%; bottom:-90px; animation-duration:14s; animation-delay:  7s; }
        .logo-float:nth-child(6)  { left: 49%; bottom:-90px; animation-duration:16s; animation-delay:  3s; }
        .logo-float:nth-child(7)  { left: 59%; bottom:-90px; animation-duration:12s; animation-delay:  9s; }
        .logo-float:nth-child(8)  { left: 69%; bottom:-90px; animation-duration:18s; animation-delay:  6s; }
        .logo-float:nth-child(9)  { left: 79%; bottom:-90px; animation-duration:15s; animation-delay:  4s; }
        .logo-float:nth-child(10) { left: 89%; bottom:-90px; animation-duration:20s; animation-delay: 11s; }

        /* Login acima do fundo */
        .login-container {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- Logos flutuantes geradas por JS (sem fundo branco) -->
    <div class="logos-bg" id="logosBg"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="logo-default.png" alt="Logo" style="height:60px">
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <input type="email" id="email" placeholder="seu@email.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn-login">
                    <span id="btnText">Entrar</span>
                    <i class="fas fa-spinner fa-spin" id="btnLoader" style="display: none;"></i>
                </button>
            </form>
        </div>

        <div class="background-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>

    <script>
    // Gera cada logo como canvas transparente com texto branco
    (function() {
        var bg = document.getElementById('logosBg');
        var sizes = [64, 80, 56, 90, 68, 75, 58, 85, 62, 72];

        for (var i = 0; i < 10; i++) {
            var s = sizes[i];
            var canvas = document.createElement('canvas');
            canvas.width  = s * 3.2;
            canvas.height = s;
            var ctx = canvas.getContext('2d');

            // Icone de carro simples
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.beginPath();
            // corpo do carro
            var w = canvas.width, h = canvas.height;
            ctx.roundRect(w*0.05, h*0.45, w*0.9, h*0.38, h*0.1);
            ctx.fill();
            // teto
            ctx.beginPath();
            ctx.roundRect(w*0.22, h*0.18, w*0.55, h*0.3, h*0.1);
            ctx.fill();
            // rodas
            ctx.beginPath();
            ctx.arc(w*0.22, h*0.83, h*0.14, 0, Math.PI*2);
            ctx.arc(w*0.78, h*0.83, h*0.14, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fill();
            // rodas interior (vazado)
            ctx.fillStyle = 'rgba(0,102,204,0.85)';
            ctx.beginPath();
            ctx.arc(w*0.22, h*0.83, h*0.07, 0, Math.PI*2);
            ctx.arc(w*0.78, h*0.83, h*0.07, 0, Math.PI*2);
            ctx.fill();

            // Texto CheckAuto
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = 'bold ' + Math.round(s*0.38) + 'px Segoe UI, Arial';
            ctx.textBaseline = 'middle';
            // nao tem texto, so icone — limpo e minimalista

            canvas.className = 'logo-float';
            bg.appendChild(canvas);
        }
    })();
    </script>

<script type="module" src="login.js"></script>
</body>
</html>
