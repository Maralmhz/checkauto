<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <title>Login — CheckAuto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            overflow: hidden;
        }

        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .login-wrapper {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ---- CAIXA CLARA IGUAL AO ORIGINAL ---- */
        .login-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeUp .5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header img {
            height: 64px;
            object-fit: contain;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 8px;
        }
        .form-group label i { color: #27ae60; }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            font-family: inherit;
            background: #fff;
            transition: border-color .3s, box-shadow .3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #27ae60;
            box-shadow: 0 0 0 4px rgba(39,174,96,.12);
        }
        .form-group input::placeholder { color: #aaa; }

        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 8px;
            transition: color .2s;
        }
        .toggle-password:hover { color: #27ae60; }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #333;
            user-select: none;
        }
        .checkbox-container input[type="checkbox"] {
            width: 17px; height: 17px;
            accent-color: #27ae60;
            cursor: pointer;
        }
        .forgot-password {
            color: #27ae60;
            text-decoration: none;
            font-weight: 600;
            transition: opacity .2s;
        }
        .forgot-password:hover { opacity: .75; text-decoration: underline; }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(39,174,96,.35);
        }
        .btn-login:hover    { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(39,174,96,.45); }
        .btn-login:active   { transform: translateY(0); }
        .btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }

        @media (max-width: 480px) {
            .login-box { padding: 30px 24px; }
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-header">
            <img src="logo-default.png" alt="CheckAuto">
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember">
                    <span>Lembrar de mim</span>
                </label>
                <a href="#" class="forgot-password">Esqueci a senha</a>
            </div>

            <button type="submit" class="btn-login">
                <span id="btnText">Entrar</span>
                <i class="fas fa-spinner fa-spin" id="btnLoader" style="display:none"></i>
            </button>
        </form>
    </div>
</div>

<script>
(function() {
    var canvas = document.getElementById('particleCanvas');
    var ctx    = canvas.getContext('2d');
    var W, H, particles = [];
    var TOTAL = 80;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function rand(a, b) { return a + Math.random() * (b - a); }

    function Particle() { this.reset(true); }
    Particle.prototype.reset = function(initial) {
        this.x     = rand(0, W);
        this.y     = initial ? rand(0, H) : H + rand(10, 40);
        this.r     = rand(1.5, 4);
        this.vx    = rand(-0.35, 0.35);
        this.vy    = -rand(0.4, 1.1);
        this.alpha = rand(0.4, 1);
        this.fade  = rand(0.003, 0.007);
    };
    Particle.prototype.update = function() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.fade;
        if (this.alpha <= 0 || this.y < -10) this.reset(false);
    };
    Particle.prototype.draw = function() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(46,204,113,' + this.alpha + ')';
        ctx.fill();
    };

    for (var i = 0; i < TOTAL; i++) particles.push(new Particle());

    function drawLines() {
        for (var a = 0; a < particles.length; a++) {
            for (var b = a + 1; b < particles.length; b++) {
                var dx = particles[a].x - particles[b].x;
                var dy = particles[a].y - particles[b].y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 100) {
                    ctx.beginPath();
                    ctx.moveTo(particles[a].x, particles[a].y);
                    ctx.lineTo(particles[b].x, particles[b].y);
                    ctx.strokeStyle = 'rgba(46,204,113,' + (0.09 * (1 - dist/100)) + ')';
                    ctx.lineWidth = 0.7;
                    ctx.stroke();
                }
            }
        }
    }

    function loop() {
        ctx.fillStyle = '#0d0d0d';
        ctx.fillRect(0, 0, W, H);
        drawLines();
        for (var i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }
        requestAnimationFrame(loop);
    }
    loop();
})();

function togglePassword() {
    var inp  = document.getElementById('password');
    var icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        inp.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>

<script type="module" src="login.js"></script>
</body>
</html>
