<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <title>Login — CheckAuto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            overflow: hidden;
        }

        #particleCanvas { position: fixed; inset: 0; z-index: 0; }

        .login-wrapper {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .login-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
            animation: fadeUp .5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header img { height: 64px; object-fit: contain; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px;
        }
        .form-group label i { color: #27ae60; font-size: 12px; }
        .form-group input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #dee2e6; border-radius: 8px;
            font-size: 14px; color: #333; font-family: inherit;
            background: #fff; transition: border-color .2s, box-shadow .2s;
        }
        .form-group input:focus {
            outline: none; border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(39,174,96,.1);
        }
        .form-group input::placeholder { color: #bbb; }

        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: transparent; border: none; color: #6c757d; cursor: pointer; padding: 6px;
        }
        .toggle-password:hover { color: #27ae60; }

        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 22px; font-size: 13px;
        }
        .checkbox-container {
            display: flex; align-items: center; gap: 7px;
            cursor: pointer; color: #333; user-select: none;
        }
        .checkbox-container input[type="checkbox"] {
            width: 15px; height: 15px; accent-color: #27ae60; cursor: pointer;
        }
        .forgot-password {
            color: #27ae60; text-decoration: none; font-weight: 600; transition: opacity .2s;
        }
        .forgot-password:hover { opacity: .75; text-decoration: underline; }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(39,174,96,.35);
            transition: transform .2s, box-shadow .2s;
        }
        .btn-login:hover    { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(39,174,96,.45); }
        .btn-login:active   { transform: translateY(0); }
        .btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }

        .btn-request {
            width: 100%; margin-top: 10px; padding: 11px;
            border-radius: 10px; border: 1.5px solid #27ae60;
            background: #f2fff6; color: #1f7a47;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: background .2s;
        }
        .btn-request:hover { background: #e0faec; }

        /* ===== MODAL ONBOARDING ===== */
        .onboarding-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.7);
            z-index: 30; display: none;
            align-items: center; justify-content: center;
            padding: 16px;
        }
        .onboarding-modal.active { display: flex; }

        .onboarding-card {
            width: 100%; max-width: 440px;
            background: #fff; border-radius: 16px;
            display: flex; flex-direction: column;
            max-height: 92vh; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            animation: fadeUp .3s ease-out;
        }

        .onboarding-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .onboarding-header h3 { font-size: 16px; color: #111; font-weight: 700; }
        .onboarding-header p  { font-size: 12px; color: #888; margin-top: 2px; }
        .btn-close-modal {
            background: #f3f4f6; border: none; border-radius: 50%;
            width: 30px; height: 30px; cursor: pointer;
            font-size: 16px; color: #666; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        .btn-close-modal:hover { background: #e5e7eb; color: #111; }

        .onboarding-body {
            padding: 16px 20px;
            overflow-y: auto; flex: 1;
        }

        .onboarding-body .form-group { margin-bottom: 10px; }
        .onboarding-body .form-group label { font-size: 12px; margin-bottom: 4px; }
        .onboarding-body .form-group input {
            padding: 9px 12px; font-size: 13px; border-radius: 7px;
        }

        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        .plan-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin: 10px 0 0;
        }
        .plan-option {
            border: 1.5px solid #e0e7e3; border-radius: 8px;
            padding: 8px 6px; cursor: pointer; text-align: center;
            font-size: 12px; font-weight: 700; color: #333;
            background: #fff; transition: border-color .2s, background .2s;
            line-height: 1.4;
        }
        .plan-option small { display: block; font-size: 11px; font-weight: 400; color: #666; }
        .plan-option:hover { border-color: #27ae60; }
        .plan-option.active { border-color: #27ae60; background: #f0fff6; color: #1a6e3c; }

        .onboarding-footer {
            padding: 12px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex; gap: 8px; justify-content: flex-end;
        }
        .btn-cancelar {
            padding: 9px 16px; border-radius: 8px;
            border: 1.5px solid #d1d5db; background: #fff;
            color: #555; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-cancelar:hover { background: #f3f4f6; }
        .btn-enviar {
            padding: 9px 18px; border-radius: 8px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff; border: none;
            font-size: 13px; font-weight: 700; cursor: pointer;
            box-shadow: 0 3px 10px rgba(39,174,96,.3);
            transition: opacity .2s;
        }
        .btn-enviar:hover { opacity: .9; }

        .toast {
            position: fixed; right: 16px; bottom: 16px; z-index: 100;
            background: #1f2937; color: #fff;
            padding: 12px 14px; border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,.25);
            font-size: 14px; display: none;
        }
        .toast.active { display: block; }

        @media (max-width: 480px) {
            .login-box { padding: 30px 24px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-header">
            <img src="logo-default.png" alt="CheckAuto">
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember">
                    <span>Lembrar de mim</span>
                </label>
                <a href="#" class="forgot-password">Esqueci a senha</a>
            </div>

            <button type="submit" class="btn-login">
                <span id="btnText">Entrar</span>
                <i class="fas fa-spinner fa-spin" id="btnLoader" style="display:none"></i>
            </button>

            <button type="button" class="btn-request" id="btnSolicitarCheckauto">
                <i class="fas fa-rocket"></i> Solicitar acesso
            </button>
        </form>
    </div>
</div>


<!-- MODAL SOLICITAR ACESSO -->
<div class="onboarding-modal" id="onboardingModal" aria-hidden="true" inert>
    <div class="onboarding-card">

        <div class="onboarding-header">
            <div>
                <h3>&#127950; Solicitar acesso CheckAuto</h3>
                <p>Preencha os dados e escolha um plano.</p>
            </div>
            <button class="btn-close-modal" id="btnCloseOnboarding" type="button">&times;</button>
        </div>

        <div class="onboarding-body">
            <form id="onboardingForm">
                <input type="hidden" id="onbPlano" value="TRIAL" />

                <div class="form-group">
                    <label for="onbNome"><i class="fas fa-shop"></i> Nome da Oficina *</label>
                    <input id="onbNome" type="text" required placeholder="Ex: Oficina Turbo" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="onbEmail"><i class="fas fa-envelope"></i> Email *</label>
                        <input id="onbEmail" type="email" required placeholder="contato@oficina.com" />
                    </div>
                    <div class="form-group">
                        <label for="onbWhatsapp"><i class="fab fa-whatsapp"></i> WhatsApp *</label>
                        <input id="onbWhatsapp" type="text" required placeholder="(11) 99999-9999" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="onbSenha"><i class="fas fa-lock"></i> Senha *</label>
                    <input id="onbSenha" type="password" required minlength="6" placeholder="M&#237;nimo 6 caracteres" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="onbCnpj"><i class="fas fa-id-card"></i> CNPJ *</label>
                        <input id="onbCnpj" type="text" required placeholder="00.000.000/0000-00" maxlength="18" />
                    </div>
                    <div class="form-group">
                        <label for="onbEndereco"><i class="fas fa-map-marker-alt"></i> Endere&#231;o</label>
                        <input id="onbEndereco" type="text" placeholder="Rua, n&#250;mero" />
                    </div>
                </div>

                <label style="font-size:12px;font-weight:600;color:#333;display:block;margin-bottom:4px;">Plano</label>
                <div class="plan-grid">
                    <button class="plan-option active" type="button" data-plano="TRIAL">
                        TRIAL <small>15 dias</small>
                    </button>
                    <button class="plan-option" type="button" data-plano="MENSAL">
                        MENSAL <small>R$99,90</small>
                    </button>
                    <button class="plan-option" type="button" data-plano="ANUAL">
                        ANUAL &#128293; <small>R$999,90</small>
                    </button>
                </div>

            </form>
        </div>

        <div class="onboarding-footer">
            <button type="button" class="btn-cancelar" id="btnCancelarOnboarding">Cancelar</button>
            <button type="button" class="btn-enviar" id="btnEnviarOnboarding">
                <i class="fas fa-paper-plane"></i> Enviar solicita&#231;&#227;o
            </button>
        </div>

    </div>
</div>

<div id="appToast" class="toast" role="status" aria-live="polite"></div>


<script>
(function() {
    var canvas = document.getElementById('particleCanvas');
    var ctx    = canvas.getContext('2d');
    var W, H, particles = [];
    var TOTAL = 80;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function rand(a, b) { return a + Math.random() * (b - a); }

    function Particle() { this.reset(true); }
    Particle.prototype.reset = function(initial) {
        this.x     = rand(0, W);
        this.y     = initial ? rand(0, H) : H + rand(10, 40);
        this.r     = rand(1.5, 4);
        this.vx    = rand(-0.35, 0.35);
        this.vy    = -rand(0.4, 1.1);
        this.alpha = rand(0.4, 1);
        this.fade  = rand(0.003, 0.007);
    };
    Particle.prototype.update = function() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.fade;
        if (this.alpha <= 0 || this.y < -10) this.reset(false);
    };
    Particle.prototype.draw = function() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(46,204,113,' + this.alpha + ')';
        ctx.fill();
    };

    for (var i = 0; i < TOTAL; i++) particles.push(new Particle());

    function drawLines() {
        for (var a = 0; a < particles.length; a++) {
            for (var b = a + 1; b < particles.length; b++) {
                var dx = particles[a].x - particles[b].x;
                var dy = particles[a].y - particles[b].y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 100) {
                    ctx.beginPath();
                    ctx.moveTo(particles[a].x, particles[a].y);
                    ctx.lineTo(particles[b].x, particles[b].y);
                    ctx.strokeStyle = 'rgba(46,204,113,' + (0.09 * (1 - dist/100)) + ')';
                    ctx.lineWidth = 0.7;
                    ctx.stroke();
                }
            }
        }
    }

    function loop() {
        ctx.fillStyle = '#0d0d0d';
        ctx.fillRect(0, 0, W, H);
        drawLines();
        for (var i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }
        requestAnimationFrame(loop);
    }
    loop();

    // Mascara CNPJ automatica
    document.addEventListener('DOMContentLoaded', function() {
        var cnpjInput = document.getElementById('onbCnpj');
        if (!cnpjInput) return;
        cnpjInput.addEventListener('input', function() {
            var v = this.value.replace(/\D/g, '').slice(0, 14);
            if (v.length > 12) v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{1,2})/, '$1.$2.$3/$4-$5');
            else if (v.length > 8) v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{1,4})/, '$1.$2.$3/$4');
            else if (v.length > 5) v = v.replace(/(\d{2})(\d{3})(\d{1,3})/, '$1.$2.$3');
            else if (v.length > 2) v = v.replace(/(\d{2})(\d{1,3})/, '$1.$2');
            this.value = v;
        });
    });
})();

function togglePassword() {
    var inp  = document.getElementById('password');
    var icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        inp.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

document.getElementById('btnEnviarOnboarding')?.addEventListener('click', function() {
    document.getElementById('onboardingForm')?.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
});
document.getElementById('btnCancelarOnboarding')?.addEventListener('click', function() {
    document.getElementById('btnCloseOnboarding')?.click();
});
</script>

<script type="module" src="login.js"></script>
</body>
</html>
